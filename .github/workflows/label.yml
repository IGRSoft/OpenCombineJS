# Check PR labels — OpenCombineJS
# Issue: #6 (CI modernization — bump action versions)
#
# Requires that every PR targeting main carries at least one of the allowed labels
# before it can be merged.  Behavior is unchanged from the original workflow;
# only the action version is bumped.
#
# Action versions verified (2026-06-11):
#   zwaldowski/match-label-action v3 — https://github.com/zwaldowski/match-label-action/releases
#     v3 is the current release; v2 is unmaintained and uses a deprecated
#     Node.js 12 runtime that GitHub will reject.

name: Check PR labels

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, labeled, unlabeled]

permissions:
  contents: read

jobs:
  check-labels:
    runs-on: ubuntu-latest

    steps:
      - name: Match PR Label
        uses: zwaldowski/match-label-action@v3
        with:
          allowed_multiple: >
            API design,
            bug,
            continuous integration,
            dependencies,
            documentation,
            enhancement,
            refactor,
            test suite,
